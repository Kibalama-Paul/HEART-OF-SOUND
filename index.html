<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Heart of Sound Pro.Co - Home</title>
<!-- styles same as above -->
<link rel="stylesheet" href="styles.css" />
<style>
  /* Additional styles for toggle menu and social icons */

  /* Container for the toggle menu */
  .menu-container {
    position: relative;
    margin-top: 20px;
    display: inline-block;
  }

  /* Hidden menu */
  .menu {
    display: none;
    flex-direction: column;
    align-items: center;
    margin-top: 10px;
  }

  /* Show menu when active */
  .menu.show {
    display: flex;
  }

  /* Style for menu links/buttons */
  .menu a {
    padding: 10px 20px;
    margin: 5px 0;
    border-radius: 50px;
    background-color: rgba(0,255,255,0.2);
    color: #00ffff;
    text-decoration: none;
    font-weight: 600;
    transition: background-color 0.3s;
  }

  .menu a:hover {
    background-color: rgba(0,255,255,0.4);
  }

  /* Social media buttons container */
  .social-media {
    margin-top: 50px;
    display: flex;
    gap: 15px;
    justify-content: center;
  }

  /* Social icons styles (simple circle buttons) */
  .social-icon {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: rgba(0,255,255,0.2);
    color: #00ffff;
    font-size: 1.5rem;
    cursor: pointer;
    transition: background-color 0.3s, box-shadow 0.3s;
  }
/* Footer Styling */
    .site-footer {
      
      color: #fff; /* White text */
      text-align: center;
      padding: 15px 0;
      font-size: 14px;
    }
  .social-icon:hover {
    background-color: rgba(0,255,255,0.4);
    box-shadow: 0 0 10px #00ffff;
  }
</style>
</head>
<body>

<!-- Video Background -->
<div class="video-background">
  <video autoplay muted loop playsinline>
    <source src="vid images/Feb-25-2026-1772023705_3145380.MOV" type="video/mp4" />
  </video>
</div>

<!-- Main Content -->
<div class="content">
  <h1 class="scroll-reveal">Heart of Sound Pro.Co</h1>
  <p class="scroll-reveal" style="max-width:600px; text-align:center;">Final Touch Elevated</p>
  
  <!-- Toggle Menu and Social Icons Section -->
  <div class="menu-container">
    <button id="exploreBtn" class="scroll-reveal">Explore More</button>
    <div id="menu" class="menu">
      <a href="about.html">About Us</a>
      <a href="services.html">Services</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="contact.html">Contact Us</a>
    </div>
  </div>
  
  <!-- Social Media Buttons at bottom -->
  <div class="social-media">
    <img src="vid images/SOCIALS/tik-tok.png" alt="TIKTOK" title="TIKTOK" onclick="window.open('https://www.tiktok.com/@heartofsound_studpro03?_r=1&_t=ZS-94FG9g2ogqu ', '_blank')" class="social-icon" />
    <img src="vid images/SOCIALS/pngimg.com - x_logo_PNG19.png" alt="Twitter" title="Twitter" onclick="window.open('https://x.com/heartofsound_1?s=21', '_blank')" class="social-icon" />
    <img src="vid images/SOCIALS/instagram.png" alt="Instagram" title="Instagram" onclick="window.open('https://www.instagram.com/heartofsoundstudios_256?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==')" class="social-icon" />
    <img src="vid images/SOCIALS/linkedin.png" alt="LinkedIn" title="LinkedIn" onclick="window.open('https://www.linkedin.com/in/heart-of-sound-production-co-3581193b3?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app', '_blank')" class="social-icon" />
  </div>
</div>
<footer class="site-footer">
  <p>Powered by Paul Technologies</p>
</footer>



<!-- Reveal on scroll and toggle script -->
<script>
  // Reveal on scroll
  const revealEls = document.querySelectorAll('.scroll-reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.2 });
  revealEls.forEach(el => observer.observe(el));

  // Toggle menu on button click
  const exploreBtn = document.getElementById('exploreBtn');
  const menu = document.getElementById('menu');

  exploreBtn.addEventListener('click', () => {
    menu.classList.toggle('show');
  });
</script>

</body>
</html>
